services:
  wixxie-home:
    build: .
    container_name: wixxie-home
    ports:
      - "80:3000"
      - "443:3000"
    environment:
      - PORT=3000
      - POLL_INTERVAL_MS=300000
      - JWT_SECRET=change-this-secret
      - DISABLE_REGISTRATION=false
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped
